name: Deploy Preview

on:
  workflow_run:
    workflows: ["Build Preview"]
    types: [completed]

permissions:
  contents: read
  actions: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy preview to Cloudflare
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: preview-build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: _site

      - name: Read PR number
        id: pr
        run: |
          if [ -f _site/pr-number ]; then
            echo "number=$(cat _site/pr-number)" >> "$GITHUB_OUTPUT"
          else
            echo "::error::pr-number file not found in artifact"
            ls -la _site/
            exit 1
          fi

      - name: Deploy preview to Cloudflare Workers
        id: deploy
        continue-on-error: true
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "PR #${{ steps.pr.outputs.number }} preview"

      - name: Comment on PR (success)
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v7
        env:
          DEPLOY_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: process.env.DEPLOY_OUTPUT
            });

      - name: Comment on PR (failure)
        if: steps.deploy.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: 'Deploy preview failed.\n\n```\ngh run view ${{ github.run_id }} --repo ${{ github.repository }} --log-failed\n```'
            });
