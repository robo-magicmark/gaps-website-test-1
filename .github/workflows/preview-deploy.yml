name: Deploy Preview

on:
  workflow_run:
    workflows: ["Build Preview"]
    types: [completed]

permissions:
  contents: read
  actions: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy preview to Cloudflare
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: preview-build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: _site

      - name: Read PR number
        id: pr
        run: |
          if [ -f _site/pr-number ]; then
            echo "number=$(cat _site/pr-number)" >> "$GITHUB_OUTPUT"
          else
            echo "::error::pr-number file not found in artifact"
            ls -la _site/
            exit 1
          fi

      - name: Check secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy preview to Cloudflare Workers
        if: steps.check-secrets.outputs.configured == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "PR #${{ steps.pr.outputs.number }} preview"

      - name: Comment on PR with deploy output
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: '```\n' + `${{ steps.deploy.outputs.command-output }}` + '\n```'
            });

      - name: Comment on PR if secrets not configured
        if: steps.check-secrets.outputs.configured == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: 'Deploy preview skipped: `CLOUDFLARE_API_TOKEN` and `CLOUDFLARE_ACCOUNT_ID` secrets are not configured on this repository.'
            });
