name: Deploy Preview

on:
  workflow_run:
    workflows: ["Build Preview"]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  deploy:
    name: Deploy preview to Cloudflare
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: preview-build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: _site

      - name: Find PR number
        id: pr
        uses: jwalton/gh-find-current-pr@f3d61b485d2801773f7a07b2aaa3306bd8f8e653 # v1.3.5
        with:
          sha: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy preview to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias "pr-${{ steps.pr.outputs.number }}" --message "PR #${{ steps.pr.outputs.number }} preview"

      - name: Hide old deploy preview comments
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }}
            });
            await Promise.all(
              comments
                .filter(c => c.body.includes('<!-- deploy-preview -->'))
                .map(c => github.graphql(`
                  mutation($id: ID!) {
                    minimizeComment(input: { subjectId: $id, classifier: OUTDATED }) {
                      minimizedComment { isMinimized }
                    }
                  }
                `, { id: c.node_id }))
            );

      - name: Comment on PR (success)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: [
                '<!-- deploy-preview -->',
                '### 🚀 Deploy Preview',
                '',
                '- **This commit:** ${{ steps.deploy.outputs.deployment-url }}',
                '- **This PR** <sub>(kept up to date)</sub>: https://pr-${{ steps.pr.outputs.number }}-gaps-website-test-1.markl.workers.dev'
              ].join('\n')
            });

      - name: Comment on PR (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: 'Deploy preview failed.\n\n```\ngh run view ${{ github.run_id }} --repo ${{ github.repository }} --log-failed\n```'
            });
