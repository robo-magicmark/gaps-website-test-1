name: Deploy Preview

on:
  workflow_run:
    workflows: ["Build Preview"]
    types: [completed]

permissions:
  contents: read
  actions: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy preview to Cloudflare
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: preview-build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: _site

      - name: Read PR number
        id: pr
        run: |
          if [ -f _site/pr-number ]; then
            echo "number=$(cat _site/pr-number)" >> "$GITHUB_OUTPUT"
          else
            echo "::error::pr-number file not found in artifact"
            ls -la _site/
            exit 1
          fi

      - name: Deploy preview to Cloudflare Workers
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "PR #${{ steps.pr.outputs.number }} preview"

      - name: Comment on PR
        if: always() && steps.pr.outputs.number
        uses: actions/github-script@v7
        env:
          DEPLOY_OUTPUT: ${{ steps.deploy.outputs.command-output }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const outcome = process.env.DEPLOY_OUTCOME;
            let body;
            if (outcome === 'success') {
              body = process.env.DEPLOY_OUTPUT;
            } else {
              body = `Deploy preview failed. View logs:\n\n\`gh run view ${process.env.RUN_ID} --repo ${{ github.repository }} --log-failed\``;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });
