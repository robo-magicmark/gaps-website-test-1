<article class="gap-row">
  <div class="gap-number">
    <a href="{{href}}">{{name}}</a>
    <span>{{status}}</span>
  </div>
  <div class="gap-main">
    <h2><a href="{{href}}">{{title}}</a></h2>
    <p>{{summary}}</p>
    {{{tagsHtml}}}
  </div>
  <div class="gap-docs">
    <div class="release-count">{{releaseCount}}</div>
    <div class="version-links">{{{versionLinksHtml}}}</div>
  </div>
</article>
